# Frontend - www.givrwrldservers.com and givrwrldservers.com
# Proxy /api/* to the API so same-origin requests work even with old/cached frontend.
upstream givrwrld_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name www.givrwrldservers.com givrwrldservers.com;
    root /opt/givrwrld/dist;
    index index.html;

    location /api/ {
        proxy_pass http://givrwrld_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
