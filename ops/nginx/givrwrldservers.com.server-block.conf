# Copy this ENTIRE block into /etc/nginx/sites-available/default
# (or create /etc/nginx/sites-available/givrwrldservers.com and paste here, then symlink to sites-enabled)
# Place it AFTER the existing default_server block, before any "# Virtual Host" comment.
#
# If you use HTTPS (certbot), you will have a second server block for 443.
# Add the same "location /api/" block and "upstream" (upstream only once) to that 443 block too.

upstream givrwrld_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name givrwrldservers.com www.givrwrldservers.com;

    root /opt/givrwrld/dist;
    index index.html;

    location /api/ {
        proxy_pass http://givrwrld_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
