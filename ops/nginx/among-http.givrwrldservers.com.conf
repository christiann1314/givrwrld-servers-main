# Impostor (Among Us) HTTPS front — Among Us 16.0.5+ expects TLS on the HTTP API.
#
# Prerequisites on the game node (same host as Wings / published allocation):
#   1) DNS: A record among-http.givrwrldservers.com -> this node's public IP (e.g. 15.204.163.237).
#   2) Issue cert (example):
#        sudo certbot certonly --nginx -d among-http.givrwrldservers.com
#      Or use your existing ACME flow; paths below must match.
#   3) Symlink into sites-enabled and reload:
#        sudo ln -sf /etc/nginx/sites-available/among-http.givrwrldservers.com.conf /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Pterodactyl: second allocation TCP port on the host (here 25571) must match Impostor
# config.json HttpServer.ListenPort. Nginx talks to localhost so only TLS hits the public internet.
#
# Security: consider blocking direct inbound TCP :25571 from the WAN (firewall) so clients only reach
# Impostor HTTP via https://among-http.givrwrldservers.com — game UDP stays on the primary port (e.g. 25570).

server {
    listen 80;
    server_name among-http.givrwrldservers.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name among-http.givrwrldservers.com;

    ssl_certificate     /etc/letsencrypt/live/among-http.givrwrldservers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/among-http.givrwrldservers.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:25571;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;
    }
}
