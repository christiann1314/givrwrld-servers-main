# Wings (daemon) reverse proxy + CORS so the Panel browser UI can call
# https://node.<domain>/api/system from https://panel.<domain> (red heart fix).
# proxy_pass port = HOST side of docker publish (e.g. compose "8082:8080" -> 8082 here).
server {
    listen 80;
    server_name node.givrwrldservers.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name node.givrwrldservers.com;

    ssl_certificate /etc/letsencrypt/live/node.givrwrldservers.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node.givrwrldservers.com/privkey.pem;

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://panel.givrwrldservers.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Accept, Content-Type, Application, X-Requested-With, X-CSRF-Token" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # Wings also emits CORS (often http://panel); strip it or the browser sees two Allow-Origin values.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;

        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header Access-Control-Allow-Origin "https://panel.givrwrldservers.com" always;
    }
}
