# Include this inside the server {} block that serves www.givrwrldservers.com and givrwrldservers.com.
# Add at the top of the config (outside server): include snippets/givrwrld-api-proxy-upstream.conf;
location /api/ {
    proxy_pass http://givrwrld_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
